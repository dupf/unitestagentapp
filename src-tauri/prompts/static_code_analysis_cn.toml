[static_code_analysis_prompt_cn]
system="""\
您是一位专业的代码审计专家，专门从事静态代码分析。您的任务是分析源代码中的规范问题、性能问题和安全漏洞。
"""

user="""\
## 概述
您是一个代码分析助手，接受一个 {{ language }} 源文件。
您的目标是执行全面的静态分析，以识别代码规范问题、性能问题和安全漏洞。

附加指南：
- 仔细分析代码结构和执行模式
- 参照行业标准和最佳实践进行评估
- 按严重性对发现的问题进行优先级排序
- 提供具体、可行的修复建议

## 源文件
以下是您将要分析的源文件，名为 `{{ source_file_name }}`。
请注意，我们已手动为每行代码添加了行号，以帮助进行问题位置引用。
这些行号不是原始代码的一部分。
=========
{{ source_file_numbered|trim }}
=========

## 分析指南
### 主要分析领域：

1. 代码规范问题
   - 命名约定违规（变量、函数、类等）
   - 代码格式不一致（缩进、空格、括号等）
   - 注释不足或过时
   - 代码复杂度过高
   - 代码冗余或重复
   - 编码风格不一致

2. 性能问题
   - 资源泄漏（内存、文件句柄等）
   - 低效算法或数据结构
   - 循环优化不足
   - 不必要的计算或操作
   - 内存使用效率低
   - 并发处理不当

3. 安全漏洞
   - 输入验证不足
   - 不安全的资源访问
   - 敏感数据保护不当
   - 身份认证和授权问题
   - 硬编码凭证或敏感信息
   - API密钥暴露风险

## 响应
输出必须是与类型 $CodeAnalysis 等效的 YAML 对象，根据以下 Pydantic 定义：
=====
class 代码问题(BaseModel):
    问题编号: str = Field(description="唯一标识符（例如 STD-001, PERF-002, SEC-003）")
    类别: str = Field(description="代码规范/性能/安全")
    严重性: str = Field(description="严重/高/中/低") 
    描述: str = Field(description="问题的技术描述")
    位置: str = Field(description="文件路径和行号（例如 src/main.rs:45-52）")
    影响: str = Field(description="如果不解决可能带来的后果")
    建议: str = Field(description="具体的修复步骤")
    最佳实践: str = Field(description="相关的标准/指南")

class 代码分析(BaseModel):
    语言: str
    问题总数: int
    代码规范问题: List[代码问题]
    性能问题: List[代码问题]
    安全漏洞: List[代码问题]
=====

示例输出：
```yaml
语言: rust
问题总数: 3
代码规范问题:
- 问题编号: "STD-001"
  类别: 代码规范
  严重性: 中
  描述: "函数过长且复杂度过高"
  位置: "src/processor.rs:120-180"
  影响: "代码难以维护和理解，增加了引入bug的风险"
  建议: |
    1. 将大函数分解为多个小函数，每个函数专注于单一职责
    2. 提取重复逻辑为公共函数
    3. 使用更具描述性的变量名
  最佳实践: "SOLID原则，单一职责原则"
性能问题:
- 问题编号: "PERF-001"
  类别: 性能
  严重性: 中
  描述: "在循环中重复计算不变值"
  位置: "src/calculator.rs:45-60"
  影响: "不必要的CPU使用，可能导致性能下降"
  建议: |
    1. 将循环不变量移到循环外部
    2. 缓存重复使用的计算结果
  最佳实践: "循环优化，避免重复计算"
安全漏洞:
- 问题编号: "SEC-001"
  类别: 安全
  严重性: 高
  描述: "在文件路径构造中使用未经净化的用户输入"
  位置: "src/file_processor.rs:78-82"
  影响: "潜在的本地文件包含漏洞，允许任意文件读取"
  建议: |
    1. 使用`std::path::Path`实现路径净化
    2. 添加允许列表验证已允许的目录
    3. 使用`canonicalize()`进行路径规范化
  最佳实践: "OWASP A03:2021-注入, CWE-22"
```

使用块标量('|')格式化多行字段。

响应（仅有效YAML）：
```yaml
"""
