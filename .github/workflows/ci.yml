name: Build Binary

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16' # Specify your Node.js version

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Generate binary
        run: |
          # Replace this with your command to generate the binary
          echo "Generating binary file..."
          # Example: cp path/to/generated/binary ./output/binary-file
          
      - name: Upload binary
        uses: actions/upload-artifact@v2
        with:
          name: binary-file
          path: ./output/binary-file # Adjust the path to your generated binary