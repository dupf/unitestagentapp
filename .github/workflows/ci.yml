name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x' # Specify your Node.js version

      - name: Install pnpm
        run: |
          npm install -g pnpm@8.6.0
      
      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      - name: Generate binary
        run: |
