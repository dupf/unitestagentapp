name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x' # Specify your Node.js version

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: npm run build

      - name: Generate binary
        run: |
          # Replace this with your command to generate the binary
          echo "Generating binary file..."
          # Example: cp path/to/generated/binary ./output/binary-file
          
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: binary-file
          path: ./output/unitestagent_bin # Adjust the path to your generated binary